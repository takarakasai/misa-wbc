name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  # Warning-zero policy: any rustc warning in this repo is a regression.
  RUSTFLAGS: "-D warnings"

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check (all targets, all features)
        run: cargo check --all-targets --all-features
      - name: Test (default = clarabel)
        run: cargo test --all-features
      # The qp module is usable stand-alone (built-in active-set solver,
      # no Clarabel). Make sure that build path stays green — the HoQP
      # tests are gated off here since they need the interior-point QP.
      - name: Build & test (no default features, qp-only)
        run: cargo test --no-default-features

  coverage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Measure coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
